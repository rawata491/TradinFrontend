services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tradin-frontend
    restart: unless-stopped
    ports:
      - "8001:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
